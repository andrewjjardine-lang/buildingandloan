<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diocese of London — Building and Loan Fund</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f3;--surface:#fff;--border:rgba(0,0,0,.1);--border-strong:rgba(0,0,0,.2);
  --text:#1a1a18;--muted:#6b6b67;--hint:#9b9b97;
  --blue:#185FA5;--blue-lt:#E6F1FB;--blue-dk:#0C447C;
  --red:#A32D2D;--red-lt:#FCEBEB;
  --green:#3B6D11;--green-lt:#EAF3DE;
  --amber:#854F0B;--amber-lt:#FAEEDA;
  --purple:#534AB7;--purple-lt:#EEEDFE;
  --radius:8px;--radius-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:224px;min-width:224px;background:var(--surface);border-right:.5px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--surface);border-bottom:.5px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px}
.content{flex:1;overflow-y:auto;padding:20px}
.sidebar-header{padding:16px;border-bottom:.5px solid var(--border)}
.sidebar-title{font-size:13px;font-weight:600;color:var(--text)}
.sidebar-sub{font-size:11px;color:var(--muted);margin-top:2px}
.nav-section{padding:8px 0}
.nav-label{font-size:10px;font-weight:600;color:var(--hint);padding:8px 16px 4px;letter-spacing:.06em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 16px;font-size:13px;color:var(--muted);cursor:pointer;border:none;background:none;width:100%;text-align:left;position:relative}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{background:var(--bg);color:var(--text);font-weight:500}
.nav-dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.4;flex-shrink:0}
.nav-item.active .nav-dot{opacity:1;background:var(--blue)}
.nav-badge{position:absolute;right:12px;background:var(--red);color:#fff;font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center;display:none}
.rates-box{margin:auto 12px 12px;padding:10px 12px;background:var(--bg);border-radius:var(--radius);border:.5px solid var(--border)}
.rates-title{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.rate-row{display:flex;justify-content:space-between;margin-bottom:4px}
.rate-label{font-size:11px;color:var(--muted)}
.rate-val{font-size:11px;font-weight:600;color:var(--text)}
.rate-edit{font-size:10px;color:var(--blue);cursor:pointer;background:none;border:none;padding:0;margin-top:4px;display:none}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:4px;color:var(--text);flex-shrink:0;font-size:20px;line-height:1}
.rate-hint{font-size:10px;color:var(--hint);margin-top:4px;display:none}
.topbar-title{font-size:15px;font-weight:500;flex:1}
.user-chip{font-size:11px;color:var(--muted);padding:4px 10px;background:var(--bg);border-radius:var(--radius);border:.5px solid var(--border);white-space:nowrap;max-width:180px;overflow:hidden;text-overflow:ellipsis}
.role-chip{font-size:10px;font-weight:600;padding:3px 8px;border-radius:var(--radius);text-transform:uppercase;letter-spacing:.04em;flex-shrink:0}
.role-admin{background:var(--purple-lt);color:var(--purple)}
.role-staff{background:var(--blue-lt);color:var(--blue-dk)}
.role-parish{background:var(--green-lt);color:var(--green)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite}
.sync-dot.err{background:var(--red)}
.sync-lbl{font-size:11px;color:var(--muted)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn{padding:6px 14px;font-size:12px;border-radius:var(--radius);border:.5px solid var(--border-strong);background:var(--surface);color:var(--text);cursor:pointer;font-family:inherit;white-space:nowrap}
.btn:hover:not(:disabled){background:var(--bg)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-primary:hover:not(:disabled){background:var(--blue-dk)}
.btn-sm{padding:3px 10px;font-size:11px}
.btn-danger{background:var(--red-lt);border-color:var(--red);color:var(--red)}
.btn-success{background:var(--green-lt);border-color:var(--green);color:var(--green)}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:20px}
.metric{background:var(--bg);border-radius:var(--radius);padding:12px 14px}
.metric-label{font-size:11px;color:var(--muted);margin-bottom:6px}
.metric-value{font-size:20px;font-weight:500}
.metric-sub{font-size:11px;color:var(--hint);margin-top:3px}
.panel{background:var(--surface);border-radius:var(--radius-lg);border:.5px solid var(--border);overflow:hidden;margin-bottom:16px}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:.5px solid var(--border);flex-wrap:wrap;gap:8px}
.panel-title{font-size:13px;font-weight:500}
.search-input{padding:5px 10px;font-size:12px;border:.5px solid var(--border-strong);border-radius:var(--radius);background:var(--surface);color:var(--text);width:190px;font-family:inherit}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:500;color:var(--muted);padding:8px 16px;text-align:left;border-bottom:.5px solid var(--border);letter-spacing:.03em;white-space:nowrap}
td{font-size:12px;padding:9px 16px;border-bottom:.5px solid var(--border);color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}
.empty{padding:36px;text-align:center;color:var(--muted);font-size:13px}
.badge{display:inline-block;padding:2px 8px;border-radius:var(--radius);font-size:10px;font-weight:500}
.b-dep{background:var(--blue-lt);color:var(--blue-dk)}
.b-loan{background:var(--red-lt);color:var(--red)}
.b-both{background:var(--green-lt);color:var(--green)}
.b-none{background:var(--bg);color:var(--muted)}
.b-pending{background:var(--amber-lt);color:var(--amber)}
.b-approved{background:var(--green-lt);color:var(--green)}
.b-rejected{background:var(--red-lt);color:var(--red)}
.tx-Deposit{color:var(--blue)}
.tx-Withdrawal{color:var(--red)}
.tx-Loan\.disbursement{color:var(--amber)}
.tx-Loan\.repayment{color:var(--green)}
.tx-interest{color:var(--purple)}
.tx-correction{color:var(--amber)}
.click-link{color:var(--blue);cursor:pointer;background:none;border:none;font-size:12px;font-family:inherit;padding:0;text-decoration:underline;text-underline-offset:2px}
.filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-btn{padding:5px 12px;font-size:11px;border-radius:var(--radius);border:.5px solid var(--border-strong);background:var(--surface);color:var(--muted);cursor:pointer}
.filter-btn.active{background:var(--blue-lt);border-color:var(--blue);color:var(--blue-dk)}
.form-row{margin-bottom:14px}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px}
.lbl{font-size:11px;font-weight:500;color:var(--muted);display:block;margin-bottom:5px;letter-spacing:.03em;text-transform:uppercase}
.inp,.sel,.ta{width:100%;padding:7px 10px;font-size:13px;border:.5px solid var(--border-strong);border-radius:var(--radius);background:var(--surface);color:var(--text);font-family:inherit}
.ta{resize:vertical;min-height:70px}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:var(--surface);border-radius:var(--radius-lg);border:.5px solid var(--border);width:520px;max-width:96vw;max-height:90vh;overflow-y:auto}
.modal-wide{width:700px}
.mh{padding:16px 20px;border-bottom:.5px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.mt{font-size:14px;font-weight:500}
.mx{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);line-height:1}
.mb{padding:20px}
.mf{padding:14px 20px;border-top:.5px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.info{background:var(--blue-lt);border-radius:var(--radius);padding:12px 16px;font-size:12px;color:var(--blue-dk);line-height:1.6;margin-bottom:14px}
.warn{background:var(--amber-lt);border-radius:var(--radius);padding:12px 16px;font-size:12px;color:var(--amber);line-height:1.6;margin-bottom:14px}
.ok{background:var(--green-lt);border-radius:var(--radius);padding:12px 16px;font-size:12px;color:var(--green);line-height:1.6;margin-bottom:14px}
.stmt-hd{padding:16px 20px;border-bottom:.5px solid var(--border)}
.stmt-name{font-size:16px;font-weight:500}
.stmt-period{font-size:12px;color:var(--muted);margin-top:3px}
.stmt-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:16px 20px;border-bottom:.5px solid var(--border)}
.sm-val{font-size:18px;font-weight:500}
.sm-lbl{font-size:11px;color:var(--muted);margin-top:2px}
.page{display:none}
.page.active{display:block}
.acard{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px}
.diff-row{display:flex;gap:8px;align-items:center;font-size:12px;margin-bottom:4px;flex-wrap:wrap}
.diff-old{color:var(--red);text-decoration:line-through}
.diff-new{color:var(--green);font-weight:500}
.import-zone{border:1.5px dashed var(--border-strong);border-radius:var(--radius-lg);padding:32px;text-align:center;cursor:pointer;color:var(--muted);font-size:13px;margin-bottom:16px}
.import-zone:hover,.import-zone.dragover{background:var(--blue-lt);border-color:var(--blue);color:var(--blue-dk)}
.urow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:.5px solid var(--border);gap:8px;flex-wrap:wrap}
.urow:last-child{border-bottom:none}
.toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:var(--radius);font-size:12px;z-index:999;max-width:340px;line-height:1.5;animation:slideup .2s ease}
@keyframes slideup{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
code{font-family:'Courier New',monospace;background:var(--bg);padding:1px 6px;border-radius:4px;font-size:11px;border:.5px solid var(--border)}
.code-block{background:#1e1e1e;border-radius:var(--radius);padding:14px 16px;font-family:'Courier New',monospace;font-size:11px;line-height:1.8;color:#d4d4d4;margin:10px 0;white-space:pre;overflow-x:auto}
.step-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius-lg);margin-bottom:16px;overflow:hidden}
.step-card-hd{padding:14px 20px;border-bottom:.5px solid var(--border);display:flex;align-items:center;gap:12px}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--blue);color:#fff;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-card-title{font-size:14px;font-weight:500}
.step-card-body{padding:16px 20px;font-size:13px;color:var(--muted);line-height:1.7}
a{color:var(--blue)}
.ro-banner{background:var(--green-lt);border-bottom:.5px solid var(--border);padding:8px 20px;font-size:12px;color:var(--green)}

/* ── Mobile responsive ───────────────────────────────── */
@media(max-width:768px){
  /* Sidebar becomes a slide-in drawer */
  .sidebar{
    position:fixed;top:0;left:0;height:100vh;z-index:300;
    transform:translateX(-100%);transition:transform .25s ease;
    box-shadow:4px 0 20px rgba(0,0,0,.15);
  }
  .sidebar.open{transform:translateX(0)}
  /* Overlay behind open sidebar */
  .sidebar-overlay{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:299;
  }
  .sidebar-overlay.open{display:block}
  /* Main takes full width */
  .main{width:100%}
  /* Topbar — show hamburger, hide title text to save space */
  .topbar{padding:0 12px;gap:6px}
  .topbar-title{font-size:13px}
  .hamburger{display:flex!important}
  /* Metrics — 2 columns on mobile */
  .metrics{grid-template-columns:repeat(2,minmax(0,1fr))}
  /* Tables scroll horizontally */
  .panel{overflow-x:auto}
  table{min-width:480px}
  /* Modals go full screen */
  .modal{width:100%!important;max-width:100vw!important;max-height:100vh!important;border-radius:0!important;margin:0}
  .modal-backdrop{align-items:flex-end}
  /* Form grids stack */
  .form-row-2,.form-row-3{grid-template-columns:1fr}
  /* Content padding reduced */
  .content{padding:12px}
  /* Filter buttons wrap nicely */
  .filter-row{gap:6px}
  .filter-btn{font-size:10px;padding:4px 8px}
  /* Consolidated report side-by-side panels stack */
  #cr-output .panel{min-width:0}
}
@media(max-width:480px){
  .metrics{grid-template-columns:1fr}
  .topbar-title{display:none}
  .user-chip{max-width:120px;font-size:10px}
}
@media print{.sidebar,.topbar,.filter-row,#stmt-actions,.btn{display:none!important}.app{display:block}.page{display:block!important}.page:not(#page-statements){display:none!important}}
</style>
</head>

<script>
// ── Mobile sidebar toggle ────────────────────────────
function toggleSidebar(){
  const sb=document.querySelector('.sidebar');
  const ov=ge('sidebar-overlay');
  if(!sb||!ov)return;
  sb.classList.toggle('open');
  ov.classList.toggle('open');
}
function closeSidebar(){
  const sb=document.querySelector('.sidebar');
  const ov=ge('sidebar-overlay');
  if(sb)sb.classList.remove('open');
  if(ov)ov.classList.remove('open');
}

// ── Utilities ─────────────────────────────────────────
const fmt=n=>'$'+Math.abs(n).toLocaleString('en-CA',{minimumFractionDigits:2,maximumFractionDigits:2});
const today=()=>new Date().toISOString().slice(0,10);
const ge=id=>document.getElementById(id);
const r2=n=>Math.round(n*100)/100;
const txColor=type=>{
  if(type==='Deposit')return'var(--blue)';
  if(type==='Withdrawal')return'var(--red)';
  if(type==='Loan disbursement')return'var(--amber)';
  if(type==='Loan repayment')return'var(--green)';
  if(type&&type.includes('interest'))return'var(--purple)';
  if(type&&type.includes('correction'))return'var(--amber)';
  return'var(--muted)';
};

// ── State ─────────────────────────────────────────────
let sb=null,currentUser=null,ROLE='staff';
let S={depositRate:2.50,loanRate:4.75,parishes:[],transactions:[],pendingCount:0,assignedParishes:[]};
let txFilter='All';
let showInterest=false;

// ── Role checks ───────────────────────────────────────
const isAdmin  =()=>ROLE==='admin';
const isStaff  =()=>ROLE==='staff';
const isParish =()=>ROLE==='parish';
const canWrite =()=>ROLE==='admin';
const canSee   =pid=>isAdmin()||isStaff()||(S.assignedParishes||[]).includes(pid);

// ── Supabase init ─────────────────────────────────────
function initSB(){sb=supabase.createClient(CONFIG.supabaseUrl,CONFIG.supabaseKey);}
async function getSession(){const{data}=await sb.auth.getSession();return data.session;}
async function doSignIn(email,pass){
  const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error)throw error;
  currentUser=data.user;
}
async function doSignOut(){await sb.auth.signOut();location.reload();}

// ── THE FIX: fetch profile first, build UI after ──────
// renderApp() is only called AFTER we know the role.
// This eliminates the timing issue completely.
async function loadProfileAndBoot(){
  showLoading('Loading your profile…');
  try{
    // Upsert ensures a profile always exists
    await sb.from('user_profiles').upsert(
      {id:currentUser.id,email:currentUser.email},
      {onConflict:'id',ignoreDuplicates:true}
    );
    const{data,error}=await sb.from('user_profiles')
      .select('role,assigned_parishes')
      .eq('id',currentUser.id)
      .single();
    if(error)throw error;
    ROLE=data?.role||'staff';
    S.assignedParishes=data?.assigned_parishes||[];
  }catch(e){
    // If profile fetch fails, default to staff but warn
    ROLE='staff';
    S.assignedParishes=[];
  }
  // NOW build the UI with the correct role
  renderApp();
  setCrestImages();
  await loadData();
}

function showLoading(msg){
  ge('root').innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100vh;gap:12px;color:var(--muted);font-size:13px">
    <div style="width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite"></div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    ${msg}
  </div>`;
}

// ── Data loading ──────────────────────────────────────
function setSyncing(v,err){
  const d=ge('sync-dot'),l=ge('sync-lbl');
  if(!d)return;
  d.className='sync-dot'+(err?' err':v?' syncing':'');
  if(l)l.textContent=err?'Error':v?'Saving…':'Synced';
}

async function loadData(){
  setSyncing(true);
  try{
    const{data:parishes,error:pe}=await sb.from('parishes').select('*').order('name');
    if(pe)throw pe;
    S.parishes=(parishes||[]).filter(p=>canSee(p.id));

    const pids=S.parishes.map(p=>p.id);
    if(pids.length){
      const{data:txs,error:te}=await sb.from('transactions').select('*').in('parish_id',pids).order('tx_date',{ascending:false}).limit(2000);
      if(te)throw te;
      S.transactions=txs||[];
    }else{S.transactions=[];}

    const{data:settings}=await sb.from('settings').select('*');
    if(settings){
      const dr=settings.find(s=>s.key==='deposit_rate');
      const lr=settings.find(s=>s.key==='loan_rate');
      if(dr)S.depositRate=parseFloat(dr.value)||2.50;
      if(lr)S.loanRate=parseFloat(lr.value)||4.75;
    }

    if(isAdmin()){
      const{count}=await sb.from('change_requests').select('*',{count:'exact',head:true}).eq('status','pending');
      S.pendingCount=count||0;
    }

    updateRates();
    refreshAll();
    updateBadge();
  }catch(e){
    setSyncing(false,true);
    toast('Error loading data: '+e.message,'error');
    return;
  }
  setSyncing(false);
}

// ── Writes ────────────────────────────────────────────
async function postTx(parishId,type,amount,date,note){
  if(!canWrite()){toast('Read-only access.','error');return;}
  setSyncing(true);
  try{
    const p=byId(parishId);
    let dep=p.deposit_balance,loan=p.loan_balance;
    if(['Deposit','Deposit interest','Deposit interest correction'].includes(type))dep=r2(dep+amount);
    if(['Withdrawal','Deposit interest reversal'].includes(type))dep=r2(dep-amount);
    if(['Loan disbursement','Loan interest','Loan interest correction'].includes(type))loan=r2(loan+amount);
    if(['Loan repayment','Loan interest reversal'].includes(type))loan=r2(loan-amount);

    const{error:te}=await sb.from('transactions').insert({parish_id:parishId,tx_date:date,tx_type:type,amount,note:note||'',created_by:currentUser?.email||''});
    if(te)throw te;
    const{error:pe}=await sb.from('parishes').update({deposit_balance:dep,loan_balance:loan}).eq('id',parishId);
    if(pe)throw pe;
    p.deposit_balance=dep;p.loan_balance=loan;
    S.transactions.unshift({parish_id:parishId,tx_date:date,tx_type:type,amount,note:note||''});
    refreshAll();toast('Transaction posted.','ok');
  }catch(e){toast('Error: '+e.message,'error');}
  setSyncing(false);
}

// ── Backdated interest correction ─────────────────────
// Admin selects: parish, date range, correct rate, type (deposit/loan)
// App calculates the difference and posts correcting entries
async function runBackdatedCorrection(parishId,fromDate,toDate,correctRate,rateType){
  if(!isAdmin()){toast('Admin only.','error');return;}
  setSyncing(true);
  try{
    const p=byId(parishId);
    // Find all interest entries in the range
    const{data:entries}=await sb.from('transactions')
      .select('*')
      .eq('parish_id',parishId)
      .eq('tx_type',rateType==='deposit'?'Deposit interest':'Loan interest')
      .gte('tx_date',fromDate)
      .lte('tx_date',toDate)
      .order('tx_date');

    if(!entries||!entries.length){
      toast('No interest entries found in that date range.','error');
      setSyncing(false);return;
    }

    const correctDailyRate=correctRate/100/365;
    let totalDiff=0;
    let correctionEntries=[];

    // For each interest entry, calculate what it should have been
    // We approximate by working backwards from current balance for each entry
    for(const e of entries){
      // Find balance at that time (approximate using the amount already posted)
      // Original rate: back-calculate from posted amount
      const postedAmount=e.amount;
      // The balance the interest was calculated on
      const balanceAtTime=rateType==='deposit'?p.deposit_balance:p.loan_balance;
      // What it should have been
      const correctAmount=r2(balanceAtTime*correctDailyRate);
      const diff=r2(correctAmount-postedAmount);
      if(Math.abs(diff)>0.001){
        correctionEntries.push({date:e.tx_date,posted:postedAmount,correct:correctAmount,diff});
        totalDiff=r2(totalDiff+diff);
      }
    }

    if(!correctionEntries.length){
      toast('No corrections needed — amounts already match.','ok');
      setSyncing(false);return;
    }

    // Post a single net correcting entry
    const corrType=rateType==='deposit'?'Deposit interest correction':'Loan interest correction';
    const corrNote=`Backdated rate correction: ${correctRate}% applied to ${fromDate}→${toDate}. Corrects ${entries.length} entries. Approved by ${currentUser.email}`;
    const absAmount=Math.abs(totalDiff);

    // If diff is positive, it's an additional credit; if negative, it's a reversal
    const entryType=totalDiff>=0?corrType:(rateType==='deposit'?'Deposit interest reversal':'Loan interest reversal');
    await sb.from('transactions').insert({parish_id:parishId,tx_date:today(),tx_type:entryType,amount:absAmount,note:corrNote,created_by:currentUser.email});

    // Update balance
    if(rateType==='deposit'){
      const newBal=r2(p.deposit_balance+(totalDiff>=0?absAmount:-absAmount));
      await sb.from('parishes').update({deposit_balance:newBal}).eq('id',parishId);
      p.deposit_balance=newBal;
    }else{
      const newBal=r2(p.loan_balance+(totalDiff>=0?absAmount:-absAmount));
      await sb.from('parishes').update({loan_balance:newBal}).eq('id',parishId);
      p.loan_balance=newBal;
    }

    S.transactions.unshift({parish_id:parishId,tx_date:today(),tx_type:entryType,amount:absAmount,note:corrNote});
    refreshAll();
    toast(`Correction posted: ${fmt(absAmount)} ${totalDiff>=0?'credited':'reversed'} across ${entries.length} entries.`,'ok');
    ge('correction-result').innerHTML=`<div class="ok">Correction posted successfully.<br>
      ${entries.length} entries reviewed · Net adjustment: ${totalDiff>=0?'+':''}${fmt(totalDiff)}<br>
      Entry posted to today (${today()}) with full audit note.</div>`;
  }catch(e){toast('Error: '+e.message,'error');}
  setSyncing(false);
}

async function approveReq(reqId){
  const{data:req}=await sb.from('change_requests').select('*').eq('id',reqId).single();
  if(!req)return;
  setSyncing(true);
  try{
    if(req.request_type==='edit'){
      if(req.target_type==='parish'){
        await sb.from('parishes').update(req.proposed_data).eq('id',req.target_id);
        const p=S.parishes.find(x=>x.id===req.target_id);if(p)Object.assign(p,req.proposed_data);
      }else{
        await sb.from('transactions').update(req.proposed_data).eq('id',req.target_id);
        const t=S.transactions.find(x=>x.id===req.target_id);if(t)Object.assign(t,req.proposed_data);
      }
    }else{
      if(req.target_type==='parish'){
        await sb.from('transactions').delete().eq('parish_id',req.target_id);
        await sb.from('parishes').delete().eq('id',req.target_id);
        S.parishes=S.parishes.filter(p=>p.id!==req.target_id);
        S.transactions=S.transactions.filter(t=>t.parish_id!==req.target_id);
      }else{
        const t=S.transactions.find(x=>x.id===req.target_id)||req.current_data;
        if(t){
          const p=S.parishes.find(x=>x.id===t.parish_id);
          if(p){
            let dep=p.deposit_balance,loan=p.loan_balance;
            if(['Deposit','Deposit interest'].includes(t.tx_type))dep=r2(dep-t.amount);
            if(t.tx_type==='Withdrawal')dep=r2(dep+t.amount);
            if(['Loan disbursement','Loan interest'].includes(t.tx_type))loan=r2(loan-t.amount);
            if(t.tx_type==='Loan repayment')loan=r2(loan+t.amount);
            await sb.from('parishes').update({deposit_balance:dep,loan_balance:loan}).eq('id',p.id);
            p.deposit_balance=dep;p.loan_balance=loan;
          }
        }
        await sb.from('transactions').delete().eq('id',req.target_id);
        S.transactions=S.transactions.filter(x=>x.id!==req.target_id);
      }
    }
    await sb.from('change_requests').update({status:'approved',reviewed_by:currentUser.email,reviewed_at:new Date().toISOString()}).eq('id',reqId);
    S.pendingCount=Math.max(0,S.pendingCount-1);
    updateBadge();refreshAll();toast('Approved.','ok');
  }catch(e){toast('Approval error: '+e.message,'error');}
  setSyncing(false);
}

  await sb.from('change_requests').update({status:'rejected',reviewed_by:currentUser.email,reviewed_at:new Date().toISOString(),review_note:note||''}).eq('id',reqId);

}

// ── Accrual ───────────────────────────────────────────
async function runAccrual(date){
  if(!isAdmin()){toast('Admin only.','error');return;}
  setSyncing(true);
  try{
    // Hard check — do not allow if ANY parish already accrued this date
    const{data:existing}=await sb.from('accrual_log').select('parish_id').eq('accrual_date',date);
    const alreadyDone=new Set((existing||[]).map(r=>r.parish_id));
    const toProcess=S.parishes.filter(p=>!alreadyDone.has(p.id));
    if(!toProcess.length){
      ge('accrual-result').innerHTML=`<div class="warn"><strong>Blocked.</strong> All parishes have already been accrued for ${date}. No entries posted. If you need to reverse an incorrect accrual, use the Bulk accrual reversal tool on this page.</div>`;
      setSyncing(false);return;
    }
    // No confirm dialog — just run for unprocessed parishes only
    let count=0;
    for(const p of toProcess){
      // Use per-parish override rates if set, otherwise global rates
      const depRate=p.deposit_rate_override!=null?parseFloat(p.deposit_rate_override):S.depositRate;
      const loanRate=p.loan_rate_override!=null?parseFloat(p.loan_rate_override):S.loanRate;
      const dr=depRate/100/365,lr=loanRate/100/365;
      let depInt=0,loanInt=0;
      if(p.deposit_balance>0&&depRate>0){
        depInt=r2(p.deposit_balance*dr);
        if(depInt>0){
          await sb.from('transactions').insert({parish_id:p.id,tx_date:date,tx_type:'Deposit interest',amount:depInt,note:`Daily accrual (rate: ${depRate}%)`,created_by:currentUser.email});
          const nb=r2(p.deposit_balance+depInt);
          await sb.from('parishes').update({deposit_balance:nb}).eq('id',p.id);
          p.deposit_balance=nb;count++;
        }
      }
      if(p.loan_balance>0&&loanRate>0){
        loanInt=r2(p.loan_balance*lr);
        if(loanInt>0){
          await sb.from('transactions').insert({parish_id:p.id,tx_date:date,tx_type:'Loan interest',amount:loanInt,note:`Daily accrual (rate: ${loanRate}%)`,created_by:currentUser.email});
          const nb=r2(p.loan_balance+loanInt);
          await sb.from('parishes').update({loan_balance:nb}).eq('id',p.id);
          p.loan_balance=nb;count++;
        }
      }
      // Insert into accrual_log — unique constraint is the hard stop for future attempts
      try{
        await sb.from('accrual_log').insert({accrual_date:date,parish_id:p.id,deposit_interest:depInt,loan_interest:loanInt,deposit_rate:depRate,loan_rate:loanRate,created_by:currentUser.email});
      }catch(logErr){
        // If log insert fails due to duplicate, the transaction was already blocked above
        // This should never happen but log it just in case
        console.warn('Accrual log insert failed for parish',p.id,logErr.message);
      }
    }
    await loadData();
    const el=ge('accrual-result');
    if(el)el.innerHTML=`<div class="ok">Done — ${count} interest entries posted for ${date}.${alreadyDone.size>0?` ${alreadyDone.size} parishes were already processed and skipped.`:''}</div>`;
    toast(`Accrual complete. ${count} entries posted.`,'ok');
  }catch(e){toast('Accrual error: '+e.message,'error');}
  setSyncing(false);
}

function parishSortIcon(col){

function renderParishes(){
  const tb=ge('parish-body');if(!tb)return;
  const q=(ge('parish-search')?.value||'').toLowerCase();
  let rows=S.parishes.filter(p=>p.name.toLowerCase().includes(q)||(p.region||'').toLowerCase().includes(q)||(p.parish_number||'').toLowerCase().includes(q));
  // Sort
  const col=parishSort.col,dir=parishSort.dir;
  rows=[...rows].sort((a,b)=>{
    let av,bv;

    else if(col==='region'){av=a.region||'';bv=b.region||'';}

    else if(col==='loan_balance'){av=a.loan_balance;bv=b.loan_balance;}
    else{av=a.name;bv=b.name;}
    if(typeof av==='number'&&typeof bv==='number')return dir==='asc'?av-bv:bv-av;
    return dir==='asc'?String(av).localeCompare(String(bv),undefined,{numeric:true}):String(bv).localeCompare(String(av),undefined,{numeric:true});
  });
  // Update header arrows

  tb.innerHTML=rows.map(p=>{
    const hD=p.deposit_balance>0,hL=p.loan_balance>0;

async function loadApprovals(){
  const c=ge('approvals-content');if(!c)return;
  c.innerHTML='<div style="padding:20px;color:var(--muted);font-size:13px">Loading…</div>';
  const{data:reqs}=await sb.from('change_requests').select('*').order('created_at',{ascending:false}).limit(100);
  if(!reqs||!reqs.length){c.innerHTML='<div class="empty">No change requests.</div>';return;}
  const pending=reqs.filter(r=>r.status==='pending');
  const reviewed=reqs.filter(r=>r.status!=='pending');
  let html='';
  if(pending.length){
    html+=`<div style="font-size:11px;font-weight:600;color:var(--hint);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px">Pending (${pending.length})</div>`;
    html+=pending.map(r=>aCard(r,true)).join('');
  }
  if(reviewed.length){
    html+=`<div style="font-size:11px;font-weight:600;color:var(--hint);letter-spacing:.06em;text-transform:uppercase;margin:20px 0 12px">Recently reviewed</div>`;
    html+=reviewed.slice(0,20).map(r=>aCard(r,false)).join('');
  }
  c.innerHTML=html;
}
function aCard(r,showAct){
  const prop=r.proposed_data||{},cur=r.current_data||{};
  const diffs=Object.keys(prop).filter(k=>String(prop[k])!==String(cur[k]));
  const diffHtml=r.request_type==='edit'?diffs.map(k=>`<div class="diff-row"><span style="color:var(--muted);min-width:110px;font-size:11px">${k}</span><span class="diff-old">${cur[k]}</span><span style="color:var(--hint);margin:0 4px">→</span><span class="diff-new">${prop[k]}</span></div>`).join(''):'<div style="font-size:12px;color:var(--red)">Delete this record permanently</div>';
  const sb2=r.status==='pending'?'<span class="badge b-pending">Pending</span>':r.status==='approved'?'<span class="badge b-approved">Approved</span>':'<span class="badge b-rejected">Rejected</span>';
  return`<div class="acard">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-size:12px;font-weight:500">${r.request_type==='edit'?'Edit':'Delete'} ${r.target_type} ${sb2}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">By ${r.requested_by} · ${(r.created_at||'').slice(0,10)}</div>
        ${r.reason?`<div style="font-size:11px;color:var(--muted);margin-top:2px;font-style:italic">"${r.reason}"</div>`:''}
        ${r.review_note?`<div style="font-size:11px;color:var(--red);margin-top:2px">Rejection note: ${r.review_note}</div>`:''}
      </div>
      ${showAct&&isAdmin()?`<div style="display:flex;gap:6px">
        <button class="btn btn-sm btn-success" onclick="approveReq('${r.id}').then(loadApprovals)">Approve</button>
        <button class="btn btn-sm btn-danger" onclick="openRejectModal('${r.id}')">Reject</button>
      </div>`:''}
    </div>
    ${diffHtml}
  </div>`;
}

let importRows=[],importType='parishes';
function renderImport(){

    <div style="padding:20px">

        <strong>Transactions CSV</strong> — columns: <code>parish_name</code>, <code>tx_date</code> (YYYY-MM-DD), <code>tx_type</code>, <code>amount</code>, <code>note</code><br>
        Export from Epicor or Excel → Save As → CSV (comma-delimited).
      </div>
      <div class="form-row">
        <label class="lbl">What are you importing?</label>
        <select class="sel" id="import-type" style="width:220px" onchange="importType=this.value">

          <option value="transactions">Transaction history</option>
        </select>
      </div>
      <div class="import-zone" onclick="ge('csv-inp').click()" ondragover="event.preventDefault();this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')" ondrop="handleDrop(event)">
        <div style="font-size:28px;margin-bottom:8px">📂</div>
        <div>Click to choose a CSV file, or drag and drop here</div>
        <div style="font-size:11px;color:var(--hint);margin-top:4px">.csv exported from Excel or Epicor</div>
      </div>
      <input type="file" id="csv-inp" accept=".csv" style="display:none" onchange="handleFile(event)">
      <div id="import-preview"></div>
      <div id="import-actions"></div>
    </div>
  </div>`;
}
function handleDrop(e){e.preventDefault();e.currentTarget.classList.remove('dragover');const f=e.dataTransfer.files[0];if(f)parseCSV(f);}
function handleFile(e){const f=e.target.files[0];if(f)parseCSV(f);}
function parseCSV(file){Papa.parse(file,{header:true,skipEmptyLines:true,complete:r=>{importRows=r.data;previewImport(r.data);},error:e=>toast('CSV error: '+e,'error')});}
function previewImport(rows){
  if(!rows.length){ge('import-preview').innerHTML='<div class="warn">No rows found.</div>';return;}
  const type=ge('import-type').value;
  const cols=type==='parishes'?['name','region','deposit_balance','loan_balance']:['parish_name','tx_date','tx_type','amount','note'];
  const missing=cols.filter(c=>!Object.keys(rows[0]).includes(c));
  if(missing.length){ge('import-preview').innerHTML=`<div class="warn">Missing columns: <strong>${missing.join(', ')}</strong><br>Your file has: ${Object.keys(rows[0]).join(', ')}</div>`;ge('import-actions').innerHTML='';return;}
  const prev=rows.slice(0,8);
  ge('import-preview').innerHTML=`<div style="font-size:12px;color:var(--muted);margin-bottom:8px">${rows.length} rows · showing first ${Math.min(8,rows.length)}</div>
    <div style="overflow-x:auto"><table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
    <tbody>${prev.map(r=>`<tr>${cols.map(c=>`<td style="font-size:11px">${r[c]||''}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
  ge('import-actions').innerHTML=`<button class="btn btn-primary" onclick="commitImport()">Import all ${rows.length} rows</button>`;
}
async function commitImport(){
  const type=ge('import-type').value,rows=importRows;
  if(!rows.length)return;
  setSyncing(true);let ok=0,fail=0;
  if(type==='parishes'){
    for(const r of rows){
      try{await sb.from('parishes').insert({name:r.name,region:r.region||'',parish_number:r.parish_number||null,deposit_balance:parseFloat(r.deposit_balance)||0,loan_balance:parseFloat(r.loan_balance)||0});ok++;}
      catch{fail++;}
    }
  }else{
    for(const r of rows){
      const p=S.parishes.find(x=>x.name.trim().toLowerCase()===String(r.parish_name).trim().toLowerCase());
      if(!p){fail++;continue;}
      try{await sb.from('transactions').insert({parish_id:p.id,tx_date:r.tx_date,tx_type:r.tx_type,amount:parseFloat(r.amount)||0,note:r.note||'',created_by:'import'});ok++;}
      catch{fail++;}
    }
  }
  setSyncing(false);
  ge('import-actions').innerHTML=`<div class="ok">Done: ${ok} rows imported${fail?', '+fail+' failed.':'.'} <button class="btn btn-sm" onclick="loadData()">Reload</button></div>`;
}

function previewAccrual(){
  const d=ge('accrual-date').value;if(!d){alert('Select a date.');return;}
  const dp=S.parishes.filter(p=>p.deposit_balance>0);
  const lp=S.parishes.filter(p=>p.loan_balance>0);
  const tDI=dp.reduce((s,p)=>{const rate=(p.deposit_rate_override!=null?parseFloat(p.deposit_rate_override):S.depositRate)/100/365;return s+p.deposit_balance*rate;},0);
  const tLI=lp.reduce((s,p)=>{const rate=(p.loan_rate_override!=null?parseFloat(p.loan_rate_override):S.loanRate)/100/365;return s+p.loan_balance*rate;},0);
  const overrides=S.parishes.filter(p=>p.deposit_rate_override!=null||p.loan_rate_override!=null).length;
  ge('accrual-preview').innerHTML=`<div style="background:var(--bg);border-radius:var(--radius);padding:12px;font-size:12px;line-height:1.9;border:.5px solid var(--border)">
    <div>Deposit interest: <strong>${dp.length} parishes</strong> · total <strong>${fmt(tDI)}</strong></div>
    <div>Loan interest: <strong>${lp.length} parishes</strong> · total <strong>${fmt(tLI)}</strong></div>
    ${overrides?`<div style="color:var(--amber);margin-top:4px">${overrides} parishes have custom rate overrides and will use their individual rates.</div>`:''}
  </div>`;
}

async function previewReversal(){
  const d=ge('reversal-date').value;if(!d){alert('Select a date.');return;}
  setSyncing(true);
  try{
    const{data:txs}=await sb.from('transactions').select('id,parish_id,tx_type,amount').eq('tx_date',d).in('tx_type',['Deposit interest','Loan interest']).ilike('note','%accrual%');
    const{data:logEntries}=await sb.from('accrual_log').select('parish_id').eq('accrual_date',d);
    if(!txs||!txs.length){ge('reversal-preview').innerHTML=`<div class="info">No accrual interest entries found for ${d}.</div>`;setSyncing(false);return;}
    const totalDep=txs.filter(t=>t.tx_type==='Deposit interest').reduce((s,t)=>s+t.amount,0);
    const totalLoan=txs.filter(t=>t.tx_type==='Loan interest').reduce((s,t)=>s+t.amount,0);
    ge('reversal-preview').innerHTML=`<div style="background:var(--bg);border-radius:var(--radius);padding:12px;font-size:12px;line-height:1.9;border:.5px solid var(--border)">
      <div>Deposit interest to reverse: <strong>${txs.filter(t=>t.tx_type==='Deposit interest').length} entries</strong> · <strong style="color:var(--red)">${fmt(totalDep)}</strong></div>
      <div>Loan interest to reverse: <strong>${txs.filter(t=>t.tx_type==='Loan interest').length} entries</strong> · <strong style="color:var(--red)">${fmt(totalLoan)}</strong></div>
      <div>Accrual log entries to remove: <strong>${(logEntries||[]).length}</strong></div>
      <div style="margin-top:6px;color:var(--amber)">After reversal, ${d} can be re-accrued correctly.</div>
    </div>`;
  }catch(e){toast('Error: '+e.message,'error');}
  setSyncing(false);
}
async function confirmReversal(){
  const d=ge('reversal-date').value;if(!d){alert('Select a date.');return;}
  if(!confirm(`Reverse ALL interest accrual for ${d}?\n\nThis will delete all Deposit interest and Loan interest accrual entries for that date, reverse the balance impact on every parish, and remove the date from the accrual log so it can be re-run.\n\nThis is logged with your name.`))return;
  setSyncing(true);
  try{
    const{data:txs,error:te}=await sb.from('transactions').select('*').eq('tx_date',d).in('tx_type',['Deposit interest','Loan interest']).ilike('note','%accrual%');
    if(te)throw te;
    if(!txs||!txs.length){toast('No accrual entries found for that date.','error');setSyncing(false);return;}
    // Calculate balance reversals per parish
    const impact={};
    txs.forEach(t=>{
      if(!impact[t.parish_id])impact[t.parish_id]={dep:0,loan:0};
      if(t.tx_type==='Deposit interest')impact[t.parish_id].dep=r2(impact[t.parish_id].dep+t.amount);
      if(t.tx_type==='Loan interest')impact[t.parish_id].loan=r2(impact[t.parish_id].loan+t.amount);
    });
    // Reverse balances
    for(const[pid,v] of Object.entries(impact)){
      const p=byId(pid);if(!p)continue;
      const upd={};
      if(v.dep>0)upd.deposit_balance=r2(p.deposit_balance-v.dep);
      if(v.loan>0)upd.loan_balance=r2(p.loan_balance-v.loan);
      if(Object.keys(upd).length){
        await sb.from('parishes').update(upd).eq('id',pid);
        if(upd.deposit_balance!=null)p.deposit_balance=upd.deposit_balance;
        if(upd.loan_balance!=null)p.loan_balance=upd.loan_balance;
      }
    }
    // Delete transactions and accrual log
    const ids=txs.map(t=>t.id);
    await sb.from('transactions').delete().in('id',ids);
    await sb.from('accrual_log').delete().eq('accrual_date',d);
    S.transactions=S.transactions.filter(t=>!ids.includes(t.id));
    const totalDep=Object.values(impact).reduce((s,v)=>s+v.dep,0);
    const totalLoan=Object.values(impact).reduce((s,v)=>s+v.loan,0);
    await loadData();
    ge('reversal-result').innerHTML=`<div class="ok"><strong>Reversal complete.</strong><br>${txs.length} entries reversed across ${Object.keys(impact).length} parishes.<br>Deposit interest reversed: ${fmt(totalDep)} · Loan interest reversed: ${fmt(totalLoan)}<br>Date ${d} is now available to re-accrue correctly.</div>`;
    ge('reversal-preview').innerHTML='';
    toast(`Reversed ${txs.length} accrual entries for ${d}.`,'ok');
  }catch(e){toast('Reversal error: '+e.message,'error');}
  setSyncing(false);
}

async function loadAccrualLog(){
  const c=ge('accruallog-content');if(!c)return;
  c.innerHTML='<div style="padding:20px;color:var(--muted);font-size:13px">Loading…</div>';
  try{
    // Summary by date
    const{data:log,error}=await sb.from('accrual_log')
      .select('accrual_date,deposit_interest,loan_interest,deposit_rate,loan_rate,created_by,created_at')
      .order('accrual_date',{ascending:false})
      .limit(500);
    if(error)throw error;
    if(!log||!log.length){
      c.innerHTML=`<div class="panel"><div class="panel-header"><span class="panel-title">Accrual log</span></div>
        <div class="empty">No accrual entries found. Run the daily accrual or check that the pg_cron job is active in Supabase.</div></div>`;
      return;
    }
    // Group by date
    const byDate={};
    log.forEach(r=>{
      if(!byDate[r.accrual_date])byDate[r.accrual_date]={date:r.accrual_date,parishes:0,totalDep:0,totalLoan:0,depRate:r.deposit_rate,loanRate:r.loan_rate,createdBy:r.created_by,createdAt:r.created_at};
      byDate[r.accrual_date].parishes++;
      byDate[r.accrual_date].totalDep+=parseFloat(r.deposit_interest)||0;
      byDate[r.accrual_date].totalLoan+=parseFloat(r.loan_interest)||0;
    });
    const dates=Object.values(byDate).sort((a,b)=>b.date.localeCompare(a.date));
    // Check for missing dates in last 30 days
    const missing=[];
    const now=new Date();
    for(let i=1;i<=30;i++){
      const d=new Date(now);d.setDate(d.getDate()-i);
      const ds=d.toISOString().slice(0,10);
      if(!byDate[ds])missing.push(ds);
    }
    c.innerHTML=`
      ${missing.length?`<div class="warn" style="margin-bottom:16px">
        <strong>${missing.length} dates in the last 30 days have no accrual entry:</strong><br>
        <span style="font-family:'Courier New',monospace;font-size:11px">${missing.slice(0,10).join(', ')}${missing.length>10?` and ${missing.length-10} more`:''}</span><br>
        <span style="margin-top:6px;display:block">You can backfill these by running accrual for each missing date. The system will only post entries for parishes not yet processed on that date.</span>
      </div>`:''}
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Accrual log — last 500 entries</span>
          <span style="font-size:11px;color:var(--muted)">${dates.length} dates processed</span>
        </div>
        <table>
          <thead><tr><th>Date</th><th>Parishes</th><th>Deposit interest</th><th>Loan interest</th><th>Dep. rate</th><th>Loan rate</th><th>Run by</th></tr></thead>
          <tbody>${dates.map(d=>`<tr>
            <td style="font-weight:500">${d.date}</td>
            <td>${d.parishes}</td>
            <td style="font-variant-numeric:tabular-nums;color:var(--blue)">${fmt(d.totalDep)}</td>
            <td style="font-variant-numeric:tabular-nums;color:var(--purple)">${d.totalLoan>0?fmt(d.totalLoan):'—'}</td>
            <td style="font-size:11px;color:var(--muted)">${parseFloat(d.depRate).toFixed(4)}%</td>
            <td style="font-size:11px;color:var(--muted)">${parseFloat(d.loanRate).toFixed(4)}%</td>
            <td style="font-size:11px;color:var(--muted)">${d.createdBy||'system'}</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>`;
  }catch(e){
    c.innerHTML=`<div class="warn">Could not load accrual log: ${e.message}<br>Make sure you have run the SQL to create the accrual_log table.</div>`;
  }
}

        <button class="btn btn-primary" onclick="generateConsolidated()">Generate report</button>

async function generateConsolidated(){
  const from=ge('cr-from').value,to=ge('cr-to').value;
  if(!from||!to){alert('Select a date range.');return;}
  const out=ge('cr-output');
  out.innerHTML='<div style="padding:20px;color:var(--muted);font-size:13px">Generating\u2026</div>';

  // Parish fund metrics
  const totalDeposits=S.parishes.reduce((s,p)=>s+p.deposit_balance,0);
  const totalLoans=S.parishes.reduce((s,p)=>s+p.loan_balance,0);
  const depParishes=S.parishes.filter(p=>p.deposit_balance>0).length;
  const loanParishes=S.parishes.filter(p=>p.loan_balance>0).length;

  // Two separate queries so daily interest rows never crowd out movement transactions.
  // Query 1: movements (Deposit, Withdrawal, etc) — always few rows
  const{data:moveTxs,error:ptErr}=await sb.from('transactions')
    .select('*')
    .gte('tx_date',from)
    .lte('tx_date',to)
    .in('tx_type',['Deposit','Withdrawal','Loan disbursement','Loan repayment'])
    .order('tx_date')
    .limit(10000);
  if(ptErr){out.innerHTML='<div class="warn">Error loading transactions: '+ptErr.message+'</div>';return;}
  // Query 2: interest entries — can be large so needs high limit
  const{data:intTxs,error:ptErr2}=await sb.from('transactions')
    .select('*')
    .gte('tx_date',from)
    .lte('tx_date',to)
    .in('tx_type',['Deposit interest','Loan interest','Deposit interest correction','Loan interest correction','Deposit interest reversal','Loan interest reversal'])
    .order('tx_date')
    .limit(100000);
  if(ptErr2){out.innerHTML='<div class="warn">Error loading transactions: '+ptErr2.message+'</div>';return;}
  const periodTxs=[...(moveTxs||[]),...(intTxs||[])];

  // Case-insensitive type matcher (guards against Epicor import capitalisation differences)
  const txIs=(t,type)=>(t.tx_type||'').toLowerCase()===type.toLowerCase();
  // Console debug — open F12 to see this
  console.log('[Consolidated] periodTxs count:', (periodTxs||[]).length, 'from:', from, 'to:', to);
  const _sample=(periodTxs||[]).slice(0,5).map(t=>({type:t.tx_type,amount:t.amount,date:t.tx_date}));
  console.log('[Consolidated] first 5 rows:', JSON.stringify(_sample));
  const depInterest=(periodTxs||[]).filter(t=>txIs(t,'Deposit interest')||txIs(t,'Deposit interest correction')).reduce((s,t)=>s+t.amount,0);
  const loanInterest=(periodTxs||[]).filter(t=>txIs(t,'Loan interest')||txIs(t,'Loan interest correction')).reduce((s,t)=>s+t.amount,0);
  const deposits=(periodTxs||[]).filter(t=>txIs(t,'Deposit')).reduce((s,t)=>s+t.amount,0);
  const withdrawals=(periodTxs||[]).filter(t=>txIs(t,'Withdrawal')).reduce((s,t)=>s+t.amount,0);
  const loanDisb=(periodTxs||[]).filter(t=>txIs(t,'Loan disbursement')).reduce((s,t)=>s+t.amount,0);
  const loanRepay=(periodTxs||[]).filter(t=>txIs(t,'Loan repayment')).reduce((s,t)=>s+t.amount,0);

  // External investment fund — use latest snapshot for current balance
  const{data:allSnaps}=await sb.from('investment_snapshots').select('*').order('snapshot_date',{ascending:false});
  const latestSnap=(allSnaps||[])[0]||null;
  const totalInvested=latestSnap?latestSnap.balance:0;
  // Snapshots in period
  const snapsInPeriod=(allSnaps||[]).filter(s=>s.snapshot_date>=from&&s.snapshot_date<=to);
  // Fees in period
  const{data:feesInPeriod}=await sb.from('investment_fees').select('*').gte('fee_date',from).lte('fee_date',to).order('fee_date');
  const totalFeesInPeriod=(feesInPeriod||[]).reduce((s,f)=>s+f.amount,0);

  // Per-parish breakdown sorted by parish number
  const parishRows=[...S.parishes].sort((a,b)=>{
    const an=a.parish_number||'zzz',bn=b.parish_number||'zzz';
    return an.localeCompare(bn,undefined,{numeric:true});
  });

  // Build parish rows HTML without template literals to avoid nesting issues
  const parishTbody=parishRows.map(p=>{
    const pTxs=(periodTxs||[]).filter(t=>t.parish_id===p.id);
    const pDepInt=pTxs.filter(t=>txIs(t,'Deposit interest')||txIs(t,'Deposit interest correction')).reduce((s,t)=>s+t.amount,0);
    const pLoanInt=pTxs.filter(t=>txIs(t,'Loan interest')||txIs(t,'Loan interest correction')).reduce((s,t)=>s+t.amount,0);
    const effDep=p.deposit_rate_override!=null?p.deposit_rate_override+'%*':S.depositRate+'%';
    const effLoan=p.loan_rate_override!=null?p.loan_rate_override+'%*':S.loanRate+'%';
    return '<tr>'
      +'<td style="color:var(--muted);font-size:11px">'+(p.parish_number||'&mdash;')+'</td>'
      +'<td><button class="click-link" onclick="openParishDetail(\''+p.id+'\')">'+p.name+'</button></td>'
      +'<td style="color:var(--muted);font-size:11px">'+(p.region||'')+'</td>'
      +'<td style="font-variant-numeric:tabular-nums">'+(p.deposit_balance>0?fmt(p.deposit_balance):'&mdash;')+'</td>'
      +'<td style="font-variant-numeric:tabular-nums;color:'+(p.loan_balance>0?'var(--red)':'var(--text)')+'">'+( p.loan_balance>0?fmt(p.loan_balance):'&mdash;')+'</td>'
      +'<td style="font-variant-numeric:tabular-nums;color:var(--purple)">'+(pDepInt>0?fmt(pDepInt):'&mdash;')+'</td>'
      +'<td style="font-variant-numeric:tabular-nums;color:var(--purple)">'+(pLoanInt>0?fmt(pLoanInt):'&mdash;')+'</td>'
      +'<td style="font-size:11px;color:var(--muted)">'+effDep+' / '+effLoan+'</td>'
      +'</tr>';
  }).join('');

  out.innerHTML=''
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">'
    +'<div style="font-size:12px;color:var(--muted)">Period: '+from+' to '+to+' &nbsp;&middot;&nbsp; Generated: '+today()+' by '+(currentUser?.email||'')+'</div>'
    +'<button class="btn btn-sm" onclick="window.print()">Print / Save as PDF</button>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px;margin-bottom:16px">'

    // Parish fund panel
    +'<div class="panel">'
    +'<div class="panel-header"><span class="panel-title">Parish deposit fund</span></div>'
    +'<div style="padding:16px">'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">'
    +'<div class="metric"><div class="metric-label">Total deposits</div><div class="metric-value" style="font-size:16px">'+fmt(totalDeposits)+'</div><div class="metric-sub">'+depParishes+' parishes</div></div>'
    +'<div class="metric"><div class="metric-label">Total loans</div><div class="metric-value" style="font-size:16px;color:'+(totalLoans>0?'var(--red)':'var(--text)')+'">'+fmt(totalLoans)+'</div><div class="metric-sub">'+loanParishes+' parishes</div></div>'
    +'<div class="metric"><div class="metric-label">Net fund position</div><div class="metric-value" style="font-size:16px">'+fmt(totalDeposits-totalLoans)+'</div><div class="metric-sub">Deposits minus loans</div></div>'
    +'<div class="metric"><div class="metric-label">Externally invested</div><div class="metric-value" style="font-size:16px;color:var(--blue)">'+fmt(totalInvested)+'</div><div class="metric-sub">'+((funds||[]).length)+' tranche'+((funds||[]).length!==1?'s':'')+'</div></div>'
    +'</div>'
    +'<div style="font-size:11px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Activity in period</div>'
    +'<table style="width:100%">'
    +'<tr><td style="font-size:12px;padding:4px 0;color:var(--muted)">New deposits</td><td style="font-size:12px;text-align:right;font-variant-numeric:tabular-nums;color:var(--green)">'+fmt(deposits)+'</td></tr>'
    +'<tr><td style="font-size:12px;padding:4px 0;color:var(--muted)">Withdrawals</td><td style="font-size:12px;text-align:right;font-variant-numeric:tabular-nums;color:var(--red)">('+fmt(withdrawals)+')</td></tr>'
    +'<tr><td style="font-size:12px;padding:4px 0;color:var(--muted)">Loan disbursements</td><td style="font-size:12px;text-align:right;font-variant-numeric:tabular-nums;color:var(--amber)">('+fmt(loanDisb)+')</td></tr>'
    +'<tr><td style="font-size:12px;padding:4px 0;color:var(--muted)">Loan repayments</td><td style="font-size:12px;text-align:right;font-variant-numeric:tabular-nums;color:var(--green)">'+fmt(loanRepay)+'</td></tr>'
    +'<tr style="border-top:.5px solid var(--border)"><td style="font-size:12px;padding:6px 0 2px;color:var(--muted)">Deposit interest paid</td><td style="font-size:12px;text-align:right;font-variant-numeric:tabular-nums;color:var(--purple)">'+fmt(depInterest)+'</td></tr>'
    +'<tr><td style="font-size:12px;padding:2px 0;color:var(--muted)">Loan interest charged</td><td style="font-size:12px;text-align:right;font-variant-numeric:tabular-nums;color:var(--purple)">'+fmt(loanInterest)+'</td></tr>'
    +'</table>'
    +'</div></div>'

    // External investment panel
    +'<div class="panel">'
    +'<div class="panel-header"><span class="panel-title">External investment fund</span></div>'
    +'<div style="padding:16px">'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">'

    // Parish breakdown table

    +'<div class="panel-header"><span class="panel-title">Parish breakdown</span></div>'

    +'<thead><tr><th>No.</th><th>Parish</th><th>Region</th><th>Deposit balance</th><th>Loan balance</th><th>Dep. interest in period</th><th>Loan interest in period</th><th>Rate</th></tr></thead>'

// ── External investment fund ──────────────────────────
let invSnapshots=[], invFees=[];

async function loadInvestmentPage(){
  const c=ge('investment-content');if(!c)return;
  c.innerHTML='<div style="padding:20px;color:var(--muted);font-size:13px">Loading...</div>';
  try{
    const{data:snaps}=await sb.from('investment_snapshots').select('*').order('snapshot_date',{ascending:false});
    const{data:fees}=await sb.from('investment_fees').select('*').order('fee_date',{ascending:false});
    invSnapshots=snaps||[];
    invFees=fees||[];
    renderInvestmentPage();
  }catch(e){
    ge('investment-content').innerHTML='<div class="warn">Could not load investment data: '+e.message+'</div>';
  }
}

function renderInvestmentPage(){
  const c=ge('investment-content');if(!c)return;

  // ── Calculations ──────────────────────────────────
  const sorted=[...invSnapshots].sort((a,b)=>a.snapshot_date.localeCompare(b.snapshot_date));
  const latest=sorted[sorted.length-1]||null;
  const currentBal=latest?latest.balance:0;
  const thisYear=new Date().getFullYear();
  const lastYear=thisYear-1;

  // Previous quarter snapshot
  const prevSnap=sorted.length>=2?sorted[sorted.length-2]:null;
  const qDollar=prevSnap?r2(currentBal-prevSnap.balance):null;
  const qPct=prevSnap&&prevSnap.balance?r2((currentBal-prevSnap.balance)/prevSnap.balance*100):null;

  // YTD — first snapshot of this year vs latest
  const firstThisYear=sorted.filter(s=>s.snapshot_date.startsWith(thisYear+'')).shift()||null;
  const ytdDollar=firstThisYear?r2(currentBal-firstThisYear.balance):null;
  const ytdPct=firstThisYear&&firstThisYear.balance?r2((currentBal-firstThisYear.balance)/firstThisYear.balance*100):null;

  // vs Prior year — last snapshot of last year vs latest
  const lastOfLastYear=[...sorted].filter(s=>s.snapshot_date.startsWith(lastYear+'')).pop()||null;
  const pyDollar=lastOfLastYear?r2(currentBal-lastOfLastYear.balance):null;
  const pyPct=lastOfLastYear&&lastOfLastYear.balance?r2((currentBal-lastOfLastYear.balance)/lastOfLastYear.balance*100):null;

  // 5-year — earliest snapshot within 5 years ago vs latest
  const fiveYearsAgo=(thisYear-5)+'-01-01';
  const fiveSnap=sorted.filter(s=>s.snapshot_date>=fiveYearsAgo).shift()||null;
  const fiveDollar=fiveSnap?r2(currentBal-fiveSnap.balance):null;
  const fivePct=fiveSnap&&fiveSnap.balance?r2((currentBal-fiveSnap.balance)/fiveSnap.balance*100):null;

  // Total fees this year
  const feesThisYear=invFees.filter(f=>f.fee_date.startsWith(thisYear+'')).reduce((s,f)=>s+f.amount,0);

  function chg(dollar,pct){
    if(dollar===null)return'<span style="color:var(--hint);font-size:12px">No data</span>';
    const col=dollar>=0?'var(--green)':'var(--red)';
    const sign=dollar>=0?'+':'';
    return'<span style="color:'+col+'">'+sign+fmt(dollar)+'</span>'
      +' <span style="font-size:11px;color:'+col+';">('+sign+pct+'%)</span>';
  }

  // ── Snapshot history table ─────────────────────────
  const snapRows=invSnapshots.map(s=>{
    const idx=sorted.findIndex(x=>x.id===s.id);
    const prev=idx>0?sorted[idx-1]:null;
    const chgDol=prev?r2(s.balance-prev.balance):null;
    const chgPct=prev&&prev.balance?r2((s.balance-prev.balance)/prev.balance*100):null;
    return '<tr>'
      +'<td>'+s.snapshot_date+'</td>'
      +'<td style="font-variant-numeric:tabular-nums;font-weight:500">'+fmt(s.balance)+'</td>'
      +'<td>'+chg(chgDol,chgPct)+'</td>'
      +'<td style="font-size:11px;color:var(--muted)">'+( s.note||'')+'</td>'
      +(isAdmin()?'<td style="display:flex;gap:4px">'
        +'<button class="btn btn-sm btn-danger" onclick="deleteSnapshot(\"'+s.id+'\")">Delete</button>'
        +'</td>':'')
      +'</tr>';
  }).join('');

  c.innerHTML=''
    // ── Metrics ───────────────────────────────────────
    +'<div class="metrics" style="margin-bottom:20px">'
    +'<div class="metric"><div class="metric-label">Current balance</div><div class="metric-value">'+fmt(currentBal)+'</div><div class="metric-sub">'+(latest?'As of '+latest.snapshot_date:'No snapshots yet')+'</div></div>'
    +'<div class="metric"><div class="metric-label">vs Previous quarter</div><div class="metric-value" style="font-size:16px">'+chg(qDollar,qPct)+'</div><div class="metric-sub">'+(prevSnap?'From '+prevSnap.snapshot_date:'Need 2+ snapshots')+'</div></div>'
    +'<div class="metric"><div class="metric-label">Year to date</div><div class="metric-value" style="font-size:16px">'+chg(ytdDollar,ytdPct)+'</div><div class="metric-sub">'+(firstThisYear?'From '+firstThisYear.snapshot_date:'No data for '+thisYear)+'</div></div>'
    +'<div class="metric"><div class="metric-label">vs Prior year</div><div class="metric-value" style="font-size:16px">'+chg(pyDollar,pyPct)+'</div><div class="metric-sub">'+(lastOfLastYear?'From end of '+lastYear:'No data for '+lastYear)+'</div></div>'
    +'</div>'
    +'<div class="metrics" style="margin-bottom:20px">'
    +'<div class="metric"><div class="metric-label">5-year growth</div><div class="metric-value" style="font-size:16px">'+chg(fiveDollar,fivePct)+'</div><div class="metric-sub">'+(fiveSnap?'From '+fiveSnap.snapshot_date:'Need data from '+fiveYearsAgo)+'</div></div>'

    +'<div class="metric"></div><div class="metric"></div>'
    +'</div>'

    // ── Quarterly snapshots ────────────────────────────
    +'<div class="panel" style="margin-bottom:16px">'
    +'<div class="panel-header"><span class="panel-title">Quarterly balance snapshots</span>'
    +(isAdmin()?'<button class="btn btn-primary btn-sm" onclick="openAddSnapshot()">+ Add snapshot</button>':'')
    +'</div>'
    +(invSnapshots.length

function openAddSnapshot(){
  showModal(''
    +'<div class="mh"><span class="mt">Add quarterly snapshot</span><button class="mx" onclick="closeModal()">x</button></div>'
    +'<div class="mb">'
    +'<div class="info">Record the total investment fund balance as of the end of the quarter.</div>'
    +'<div class="form-row"><label class="lbl">Snapshot date</label><input type="date" class="inp" id="snap-date" value="'+today()+'"></div>'
    +'<div class="form-row"><label class="lbl">Total balance ($)</label><input type="number" class="inp" id="snap-bal" placeholder="e.g. 4250000.00" step="0.01" min="0"></div>'
    +'<div class="form-row"><label class="lbl">Note (optional)</label><input type="text" class="inp" id="snap-note" placeholder="e.g. Q1 2026 — RBC statement"></div>'
    +'</div>'
    +'<div class="mf"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveSnapshot()">Save snapshot</button></div>'

async function saveSnapshot(){
  const date=ge('snap-date').value;
  const bal=parseFloat(ge('snap-bal').value);
  const note=ge('snap-note').value.trim();
  if(!date||isNaN(bal)||bal<0){alert('Please enter a valid date and balance.');return;}
  setSyncing(true);
  try{
    const{data,error}=await sb.from('investment_snapshots').insert({snapshot_date:date,balance:r2(bal),note:note||null,created_by:currentUser.email}).select().single();
    if(error)throw error;
    invSnapshots.unshift(data);
    closeModal();renderInvestmentPage();toast('Snapshot saved.','ok');
  }catch(e){toast('Error: '+e.message,'error');}
  setSyncing(false);
}

async function deleteSnapshot(id){
  if(!isAdmin())return;
  if(!confirm('Delete this snapshot? This cannot be undone.'))return;
  setSyncing(true);
  try{
    const{error}=await sb.from('investment_snapshots').delete().eq('id',id);
    if(error)throw error;
    invSnapshots=invSnapshots.filter(s=>s.id!==id);
    renderInvestmentPage();toast('Snapshot deleted.','ok');
  }catch(e){toast('Error: '+e.message,'error');}
  setSyncing(false);
}

async function saveFee(){
  const date=ge('fee-date').value;
  const amt=parseFloat(ge('fee-amt').value);
  const note=ge('fee-note').value.trim();
  if(!date||isNaN(amt)||amt<=0){alert('Please enter a valid date and amount.');return;}

async function deleteFee(id){
  if(!isAdmin())return;

// ── Pages ─────────────────────────────────────────────
function showPage(name,btn){
  closeSidebar();
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  ge('page-'+name).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const titles={dashboard:'Dashboard',parishes:'Parishes',transactions:'Transactions',statements:'Statements',consolidated:'Consolidated fund report',investment:'External investment fund',adminfees:'Admin fees',accrual:'Daily accrual',accruallog:'Accrual log',correction:'Interest correction',approvals:'Change requests',users:'User management',import:'Import data',setup:'Setup & backups'};
  const t=ge('page-title');if(t)t.textContent=titles[name]||name;
  if(name==='statements')populateStmt();
  if(name==='consolidated')renderConsolidated();
  if(name==='investment'){if(isParish()){toast('Access restricted.','error');return;}loadInvestmentPage();}
  if(name==='adminfees'){if(isParish()){toast('Access restricted.','error');return;}loadAdminFeesPage();}
  if(name==='transactions'){const c=ge('tx-filters');if(c){c.innerHTML='';renderTxFilters();}renderTxTable();}
  if(name==='accrual'){ge('accrual-date').value=today();ge('accrual-result').innerHTML='';}
  if(name==='accruallog')loadAccrualLog();
  if(name==='correction')renderCorrectionPage();
  if(name==='approvals')loadApprovals();
  if(name==='users')loadUsers();
  if(name==='import')renderImport();
  if(name==='setup')renderSetupPage();
}

// ── Toast ─────────────────────────────────────────────
function toast(msg,type='info'){
  const t=document.createElement('div');t.className='toast';
  const bg=type==='error'?'var(--red-lt)':type==='ok'?'var(--green-lt)':'var(--blue-lt)';
  const cl=type==='error'?'var(--red)':type==='ok'?'var(--green)':'var(--blue-dk)';
  const bc=type==='error'?'var(--red)':type==='ok'?'var(--green)':'var(--blue)';
  t.style.cssText+=`background:${bg};color:${cl};border:.5px solid ${bc}`;
  t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),4000);
}

async function submitSignIn(){
  const email=ge('si-email').value.trim(),pass=ge('si-pass').value;
  if(!email||!pass){showAuthErr('Please enter your email and password.');return;}
  try{
    await doSignIn(email,pass);
    await loadProfileAndBoot(); // fetch role THEN render
  }catch(e){showAuthErr(e.message);}
  setCrestImages();
}
function showAuthErr(msg){const e=ge('auth-err');if(!e)return;e.textContent=msg;e.style.display='block';}

// Set crest images from the single hidden source — runs after DOM ready
function setCrestImages(){
  var src=document.getElementById('crest-src');
  if(!src)return;
  var url=src.src;
  ['crest-img-1','crest-img-2'].forEach(function(id){
    var el=document.getElementById(id);
    if(el)el.src=url;
  });
}
document.addEventListener('DOMContentLoaded',setCrestImages);
